body:
  text: 一凡人雖有性心亡定志待物而後作待悅而後行待習而後定喜怒哀悲之氣性也及其見於外則物取之也性自命出命自天降道始於情情生於性始者近情終者近義知情者能出之知義者能入之好惡者性也所好惡物也善不善性也所善所不善勢也
