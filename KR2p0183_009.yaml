body:
  text: 九凡聲其出於情也信然後其入撥人之心也夠聞笑聲則馨如也斯喜聞歌謠則陶如也斯奮聽琴瑟之聲則悸如也斯戁觀賚武則齊如也斯作觀韶夏則勉如也斯斂永思而動心葨如也斯嘆其居節也舊其反善復始也慎其出入也順治其德也鄭衛之樂非其聽而從之也
