body:
  text: 八凡道心為主道四術也唯人道為可道也其三術者道之而已詩書禮樂其始出也皆生於人詩有為為之也書有為言之也禮樂有為舉之也聖人比其類而論會之觀其先後而逆順之體其義而節文之理其情而出入之然後復以教教所以生德於中者也禮作於情或興之也當事因方而制之其先後之序則宜道也又序為之節則文也至容貌所以取節也君子美其情貴其義善其節好其容樂其道悅其教是以敬焉拜所以其敏也幣帛所以為信與徵也其治義道也笑禮之薄澤也樂喜之深澤也
