body:
  text: 十三凡人之情為可悅也苟以其情雖過不惡不以其情雖難不貴未言而信有美情者也未教而民恒性善者也未賞而民勸含福者也未刑而民畏有心畏者也賤而民貴之有德者也貧而民聚焉有道者也獨居而樂有內動者也惡之而不可非者達於義者也非之而不可惡者篤於仁者也行之不過知道者也聞道反上上交者也聞道反下下交者也聞道反己修身者也上交近事君下交得眾近從政修身近至仁同方而交以道者也不同方而交以故者也同悅而交以德者也不同悅而交以猷者也門內之治欲其逸也門外之治欲其制也
