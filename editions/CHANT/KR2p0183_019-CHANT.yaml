body:
  text: 十九凡學者求其心有偽也弗得之矣人之不能以偽也可知也不過直舉其心必在焉察其見者情焉失哉詘義之方也義敬之方也敬物之則也篤仁之方也仁性之方也性或生之忠信之方也信情之方也情出於性愛類七唯性愛為近仁知類五唯義道為近忠惡類三惡不仁為近義所為道者四唯人道為可道也
