body:
  text: 二十凡用心之忭者思為甚用智之疾者患為甚用情之至者哀樂為甚用身之忭者悅為甚用力之盡者利為甚目之好色耳之樂聲鬱陶之氣也不難為之死有其為人之節節如也不有夫柬柬之心則采有其為人之柬柬如也不有夫恒忻之志則縵人之巧言利辭者不有夫詘詘之心則流人之悅然可與和安者不有夫奮作之情則侮有其為人之快如也弗牧不可有其為人之願如也弗輔不足
